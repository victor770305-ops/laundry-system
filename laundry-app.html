<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洗衣管家 - 專業獲利對帳系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 列印格式優化：確保轉存 PDF 時只留下報表內容 */
        @media print {
            body { background: white !important; }
            nav, .no-print, button, #financeForm { display: none !important; }
            .print-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .print-card { border: 1px solid #e2e8f0 !important; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .animate-shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50 no-print">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold flex items-center"><i class="fas fa-coins mr-2 text-yellow-400"></i>連鎖洗衣管家</h1>
            <div class="flex items-center space-x-2">
                <input type="month" id="reportMonth" onchange="updateUI()" class="bg-blue-800 text-sm rounded-lg px-3 py-1.5 outline-none text-white border-none focus:ring-2 focus:ring-blue-400">
                <select id="currentStore" onchange="updateUI()" class="bg-blue-800 text-sm rounded-lg px-3 py-1.5 outline-none text-white border-none min-w-[140px]">
                    <option value="">讀取資料中...</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 no-print">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">當月累計營收</p>
                <p id="totalIncome" class="text-3xl font-black text-emerald-600 mt-1">$0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-rose-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">當月累計支出</p>
                <p id="totalExpense" class="text-3xl font-black text-rose-600 mt-1">$0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-600 relative overflow-hidden">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">當月預估淨利</p>
                <p id="netProfit" class="text-3xl font-black text-blue-700 mt-1">$0</p>
                <button onclick="openPasswordModal()" class="absolute top-4 right-4 bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-100 transition-all">
                    <i class="fas fa-lock mr-1"></i> 查分紅
                </button>
            </div>
        </div>

        <div id="mainView" class="grid grid-cols-1 lg:grid-cols-3 gap-8 no-print text-sm">
            <section class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                <h2 class="text-lg font-bold mb-6 text-slate-700 border-b pb-2">錄入帳務</h2>
                <form id="financeForm" class="space-y-4">
                    <input type="date" id="date" required class="w-full border-slate-200 rounded-xl p-3 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="category" class="w-full border-slate-200 rounded-xl p-3 bg-slate-50 outline-none"></select>
                    <input type="number" id="amount" placeholder="金額" required class="w-full border-slate-200 rounded-xl p-3 bg-slate-50 outline-none">
                    <textarea id="note" rows="2" class="w-full border-slate-200 rounded-xl p-3 bg-slate-50 outline-none" placeholder="備註內容"></textarea>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 shadow-lg transition-all">儲存至雲端</button>
                </form>
                <div id="msgBox" class="hidden mt-4 p-3 rounded-xl text-center font-bold"></div>
            </section>

            <section class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-md border border-slate-100 overflow-x-auto">
                <h2 class="text-lg font-bold mb-6 text-slate-700 border-b pb-2">當月流水明細</h2>
                <table class="w-full text-left">
                    <thead class="text-slate-400 border-b text-xs uppercase">
                        <tr><th class="pb-3">日期</th><th class="pb-3">項目</th><th class="pb-3 text-right">金額</th></tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </section>
        </div>

        <div id="shareholderView" class="hidden animate-fade-in">
            <div id="printArea" class="bg-white p-8 rounded-3xl shadow-xl border border-blue-100 max-w-2xl mx-auto print-container">
                <div class="flex justify-between items-start mb-8 border-b-2 border-slate-800 pb-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">Shareholder Statement</h2>
                        <h3 class="text-xl font-bold text-blue-600 mt-1">股東收益結算報表</h3>
                        <p id="printStoreMonth" class="text-sm text-slate-400 font-bold mt-1"></p>
                    </div>
                    <div class="flex space-x-2 no-print">
                        <button onclick="window.print()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">
                            <i class="fas fa-file-pdf mr-1"></i> 匯出 PDF
                        </button>
                        <button onclick="showView('mainView')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2 rounded-xl text-sm font-bold">
                            返回
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-10 text-center">
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 print-card">
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">本月總營收</p>
                        <p id="printTotalIncome" class="text-lg font-black text-emerald-600 mt-1"></p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 print-card">
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">本月總支出</p>
                        <p id="printTotalExpense" class="text-lg font-black text-rose-600 mt-1"></p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-200 print-card">
                        <p class="text-blue-500 text-[10px] font-bold uppercase tracking-wider">當月總淨利</p>
                        <p id="printNetProfit" class="text-lg font-black text-blue-700 mt-1"></p>
                    </div>
                </div>
                
                <h4 class="text-sm font-bold text-slate-500 mb-4 border-l-4 border-blue-600 pl-3">股東收益分配明細 (Dividend Breakdown)</h4>
                <div id="dividendDisplay" class="space-y-4"></div>

                <div class="mt-16 pt-8 border-t border-dashed border-slate-200 text-center">
                    <p class="text-sm text-slate-400 font-bold italic">洗衣管家 財務結算系統自動產出</p>
                    <p class="text-[10px] text-slate-300 mt-2 italic">報表生成時間：<span id="printTime"></span></p>
                </div>
            </div>
        </div>

        <div id="pwdModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div id="modalContent" class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center no-print">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fas fa-lock"></i></div>
                <h3 class="text-xl font-black text-slate-800 mb-2">請輸入 4 位數密碼</h3>
                <input type="password" id="pwdInput" maxlength="4" placeholder="••••" class="w-full text-center text-4xl border-2 border-slate-100 rounded-2xl p-4 outline-none mb-6 tracking-widest font-mono focus:border-blue-500">
                <div class="flex space-x-3">
                    <button onclick="document.getElementById('pwdModal').classList.add('hidden')" class="flex-1 py-3 text-slate-400 font-bold hover:bg-slate-50 rounded-xl">取消</button>
                    <button onclick="checkPassword()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200">驗證</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 設定區
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbySaVRKP9sv4FTKWWrOJ4bOLSNsdMIIzr16uZ4DWP8p5aCWcRL5ULLZoQ5PTkuAfPY5Jw/exec";
        const SECURE_PIN = "1234"; // 修改此處變更查分紅密碼

        const now = new Date();
        document.getElementById('date').valueAsDate = now;
        document.getElementById('reportMonth').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        let globalData = { stores: [], income: [], expense: [], history: [], shareholders: [] };

        function openPasswordModal() {
            document.getElementById('pwdModal').classList.remove('hidden');
            document.getElementById('pwdInput').value = "";
            document.getElementById('pwdInput').focus();
        }
        function checkPassword() {
            if (document.getElementById('pwdInput').value === SECURE_PIN) {
                document.getElementById('pwdModal').classList.add('hidden');
                showView('shareholderView');
            } else { 
                alert("密碼錯誤，請再試一次"); 
                document.getElementById('modalContent').classList.add('animate-shake');
                setTimeout(() => document.getElementById('modalContent').classList.remove('animate-shake'), 400);
            }
        }
        function showView(viewId) {
            document.getElementById('mainView').classList.toggle('hidden', viewId !== 'mainView');
            document.getElementById('shareholderView').classList.toggle('hidden', viewId !== 'shareholderView');
            updateUI();
        }

        async function init() {
            try {
                const response = await fetch(SCRIPT_URL);
                globalData = await response.json();
                document.getElementById('currentStore').innerHTML = globalData.stores.map(s => `<option value="${s}">${s}</option>`).join('');
                let catHtml = `<optgroup label="收入項目">${globalData.income.map(c => `<option value="收入-${c}">${c}</option>`).join('')}</optgroup>`;
                catHtml += `<optgroup label="支出項目">${globalData.expense.map(c => `<option value="支出-${c}">${c}</option>`).join('')}</optgroup>`;
                document.getElementById('category').innerHTML = catHtml;
                updateUI();
            } catch (e) { console.error("API 連線失敗，請檢查 URL"); }
        }

        function updateUI() {
            const store = document.getElementById('currentStore').value;
            const month = document.getElementById('reportMonth').value;
            let inc = 0, exp = 0, histHtml = "";

            const filtered = globalData.history.filter(row => {
                const rM = `${new Date(row[0]).getFullYear()}-${String(new Date(row[0]).getMonth() + 1).padStart(2, '0')}`;
                return row[1] === store && rM === month;
            });

            filtered.reverse().forEach(row => {
                const amt = parseFloat(row[3]) || 0;
                if (row[5] === "收入") inc += amt; else exp += amt;
                histHtml += `<tr><td class="py-3 font-mono text-slate-400 text-xs">${new Date(row[0]).toLocaleDateString()}</td><td class="font-bold">${row[2]}</td><td class="text-right font-black ${row[5]==='收入'?'text-emerald-500':'text-rose-500'}">${amt.toLocaleString()}</td></tr>`;
            });

            const net = inc - exp;
            
            // 更新 UI
            document.getElementById('totalIncome').innerText = `$${inc.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `$${exp.toLocaleString()}`;
            document.getElementById('netProfit').innerText = `$${net.toLocaleString()}`;
            document.getElementById('historyBody').innerHTML = histHtml || '<tr><td colspan="3" class="py-10 text-center text-slate-300 italic">本月查無帳務數據</td></tr>';

            // 更新 PDF 對帳單內容
            document.getElementById('printStoreMonth').innerText = `${store} | ${month}`;
            document.getElementById('printTotalIncome').innerText = `$${inc.toLocaleString()}`;
            document.getElementById('printTotalExpense').innerText = `$${exp.toLocaleString()}`;
            document.getElementById('printNetProfit').innerText = `$${net.toLocaleString()}`;
            document.getElementById('printTime').innerText = new Date().toLocaleString();

            const shData = globalData.shareholders.filter(s => s[0] === store);
            document.getElementById('dividendDisplay').innerHTML = shData.map(s => {
                const ratio = parseFloat(s[2]);
                const bonus = net > 0 ? Math.floor(net * ratio) : 0;
                return `<div class="flex justify-between items-center bg-slate-50 p-5 rounded-2xl border border-slate-100 print-card">
                    <div><h3 class="font-bold text-slate-700">${s[1]}</h3><p class="text-[10px] text-slate-400 font-bold">Ownership: ${(ratio*100).toFixed(1)}%</p></div>
                    <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase">Estimated Bonus</p><p class="text-2xl font-black text-blue-600">$${bonus.toLocaleString()}</p></div>
                </div>`;
            }).join('');
        }

        document.getElementById('financeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('msgBox');
            const cat = document.getElementById('category').value;
            const payload = {
                date: document.getElementById('date').value,
                store: document.getElementById('currentStore').value,
                category: cat.split('-')[1],
                type: cat.split('-')[0],
                amount: document.getElementById('amount').value,
                note: document.getElementById('note').value
            };
            btn.disabled = true;
            msg.className = "mt-4 p-3 bg-blue-50 text-blue-600 block rounded-xl font-bold";
            msg.innerText = "資料儲存中，請稍候...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                msg.className = "mt-4 p-3 bg-emerald-50 text-emerald-600 block rounded-xl font-bold";
                msg.innerText = "✅ 儲存成功！正在重新整理...";
                setTimeout(() => location.reload(), 1200);
            } catch (err) { 
                btn.disabled = false; 
                msg.className = "mt-4 p-3 bg-rose-50 text-rose-600 block rounded-xl font-bold";
                msg.innerText = "儲存失敗，請檢查網路";
            }
        });

        // 支援鍵盤 Enter 鍵驗證
        document.getElementById('pwdInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword(); });

        window.onload = init;
    </script>
</body>
</html>
